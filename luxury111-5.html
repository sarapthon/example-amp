/* -----------------------------------------------
   TEMPLATE 26 - TREASURE CHEST / LOOT BOX
   Open wooden chest, gold studs, light-ray burst,
   glowing loot reveal frame, loot-item rows.
----------------------------------------------- */
:root{
  --wood:#6b4423;
  --wood-dark:#4a2f18;
  --gold:#ffd700;
  --gold-dark:#b8860b;
  --bg:#160a28;
  --bg2:#2a1450;
  --ink:#fff;
  --muted:#c9b8e0;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:radial-gradient(ellipse 90% 60% at 50% 0%, var(--bg2) 0%, var(--bg) 60%);
  color:var(--ink);
  overflow-x:hidden;
  min-height:100vh;
  position:relative;
}

/* -- SPARKLES -- */
.sparkle{
  position:fixed;border-radius:50%;background:#fff;z-index:0;pointer-events:none;
  animation:twinkle 2.4s ease-in-out infinite;
}
.s1{width:3px;height:3px;top:10%;left:15%}
.s2{width:2px;height:2px;top:22%;left:80%;animation-delay:.6s}
.s3{width:4px;height:4px;top:65%;left:10%;animation-delay:1.2s}
.s4{width:2px;height:2px;top:75%;left:88%;animation-delay:1.8s}
.s5{width:3px;height:3px;top:40%;left:50%;animation-delay:.9s}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

.wrap{
  max-width:420px;margin:0 auto;padding:24px 16px 40px;
  position:relative;z-index:2;
  display:flex;flex-direction:column;gap:16px;align-items:center;
}

.logo-row{display:flex;justify-content:center}

/* -- LIGHT BURST + LOOT REVEAL -- */
.burst-frame{
  position:relative;width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:10px 0;
}
.light-burst{
  position:absolute;width:280px;height:280px;
  background:repeating-conic-gradient(from 0deg, rgba(255,215,0,0.25) 0deg 10deg, transparent 10deg 30deg);
  border-radius:50%;
  animation:raysBurst 20s linear infinite;
}
@keyframes raysBurst{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
.loot-reveal{
  position:relative;width:78%;border-radius:16px;overflow:hidden;
  border:4px solid var(--gold);
  box-shadow:0 0 0 6px rgba(255,215,0,0.15);
  animation:lootGlow 2.4s ease-in-out infinite alternate;
}
@keyframes lootGlow{
  from{box-shadow:0 0 0 6px rgba(255,215,0,0.12), 0 0 20px rgba(255,215,0,0.3)}
  to{box-shadow:0 0 0 10px rgba(255,215,0,0.22), 0 0 40px rgba(255,215,0,0.6)}
}

/* -- HEADLINE -- */
.headline{text-align:center}
.headline .eyebrow{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dark);
  margin-bottom:4px;
}
.headline h1{
  font-size:22px;font-weight:bold;color:var(--gold);
  text-shadow:0 0 10px rgba(255,215,0,0.6);
}

/* -- CHEST GRAPHIC -- */
.chest{width:100%;max-width:260px;display:flex;flex-direction:column;align-items:center}
.chest-lid{
  width:100%;height:34px;
  background:linear-gradient(160deg,var(--wood) 0%,var(--wood-dark) 100%);
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
  border:3px solid var(--gold-dark);
  position:relative;
  transform-origin:bottom center;
  animation:lidOpen 2.4s ease-in-out infinite alternate;
}
@keyframes lidOpen{
  from{transform:rotateX(0deg)}
  to{transform:rotateX(-25deg)}
}
.chest-body{
  width:100%;height:70px;
  background:
    repeating-linear-gradient(90deg, rgba(255,215,0,0.15) 0 2px, transparent 2px 28px),
    linear-gradient(160deg,var(--wood) 0%,var(--wood-dark) 100%);
  border:3px solid var(--gold-dark);
  border-radius:0 0 10px 10px;
  position:relative;
}
.chest-lock{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:26px;height:26px;border-radius:6px;
  background:linear-gradient(160deg,#ffe27a,var(--gold) 60%,var(--gold-dark));
  border:2px solid var(--gold-dark);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#5a4400;
}

/* -- MAIN CTA -- */
.claim-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-decoration:none;color:#5a4400;
  background:linear-gradient(160deg,#ffe27a,var(--gold) 50%,var(--gold-dark));
  border-radius:99px;
  padding:14px 22px;width:100%;
  font-size:15px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 10px 26px rgba(255,215,0,0.4);
  animation:ctaGlow 2s ease-in-out infinite;
  transition:transform .12s;
}
.claim-cta:active{transform:scale(0.97)}
@keyframes ctaGlow{
  0%,100%{box-shadow:0 10px 26px rgba(255,215,0,0.35)}
  50%{box-shadow:0 10px 36px rgba(255,215,0,0.7)}
}

/* -- DIVIDER -- */
.hr{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}

/* -- LOOT LIST -- */
.loot-list{display:flex;flex-direction:column;gap:8px;width:100%}
.loot-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  border:1px solid rgba(255,215,0,0.3);
  border-radius:10px;
  padding:10px 12px;
  background:rgba(255,215,0,0.05);
}
.loot-left{display:flex;align-items:center;gap:10px;min-width:0}
.loot-gem{
  flex-shrink:0;width:30px;height:30px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  background:linear-gradient(160deg,#ffe27a,var(--gold));
  color:#5a4400;
}
.loot-text{min-width:0}
.loot-name{font-size:13px;font-weight:bold;color:var(--ink)}
.loot-sub{font-size:9px;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.loot-btn{
  flex-shrink:0;
  display:inline-block;padding:8px 16px;border-radius:99px;
  font-size:10px;font-weight:bold;letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;color:#5a4400;
  background:linear-gradient(160deg,#ffe27a,var(--gold));
  transition:transform .1s;
}
.loot-btn:active{transform:scale(0.95)}

/* -- FOOTER -- */
.footer{
  text-align:center;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;
}
.footer a{color:var(--gold);text-decoration:none;font-weight:bold}
</style>
</head>
