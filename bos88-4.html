/* -----------------------------------------------
   TEMPLATE 19 - CHINESE FORTUNE / IMLEK
   Red & gold lucky card, coins, lanterns, clouds,
   fretwork border, shimmer headline.
----------------------------------------------- */
:root{
  --red:#8b0000;
  --red2:#b3001b;
  --gold:#ffd700;
  --gold-dark:#c9a227;
  --ink:#2a0a0a;
  --cream:#fff6d8;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Georgia,'Times New Roman',serif;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,215,0,0.12) 0%, transparent 60%),
    linear-gradient(160deg,var(--red2) 0%, var(--red) 100%);
  color:var(--cream);
  overflow-x:hidden;
  min-height:100vh;
  position:relative;
}

/* -- FLOATING LANTERNS / COINS / CLOUDS -- */
.deco{position:fixed;z-index:0;pointer-events:none;opacity:.5}
.lantern{
  width:24px;height:30px;border-radius:8px;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark));
  position:fixed;animation:sway 5s ease-in-out infinite;
}
.lantern::after{
  content:'';position:absolute;bottom:-10px;left:50%;width:1px;height:10px;background:var(--gold);
}
.lantern1{top:8%;left:6%;animation-delay:0s}
.lantern2{top:14%;right:8%;animation-delay:1.5s}
@keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}

.coin{
  position:fixed;border-radius:50%;
  border:3px solid var(--gold);
  background:radial-gradient(circle,var(--gold-dark) 0%, var(--gold) 60%, var(--gold-dark) 100%);
  display:flex;align-items:center;justify-content:center;
  color:var(--red);font-size:10px;font-weight:bold;
  animation:coinSpin 6s linear infinite;
}
.coin::after{content:'';width:40%;height:40%;border:2px solid var(--red);position:absolute}
.coin1{width:26px;height:26px;top:60%;left:8%}
.coin2{width:18px;height:18px;top:75%;right:10%;animation-delay:2s}
@keyframes coinSpin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}

.wrap{
  max-width:420px;margin:0 auto;padding:26px 14px 40px;
  position:relative;z-index:2;
}

/* -- CARD with fretwork border -- */
.card{
  position:relative;
  border-radius:16px;
  padding:6px;
  background:repeating-linear-gradient(45deg, var(--gold) 0 4px, var(--gold-dark) 4px 8px);
}
.card-inner{
  border-radius:12px;
  border:2px solid var(--gold);
  background:linear-gradient(160deg,#9c1010,var(--red));
  padding:18px 16px;
  display:flex;flex-direction:column;gap:14px;
}

.logo-row{display:flex;justify-content:center}

/* -- HEADLINE with flourish dividers -- */
.headline-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.flourish{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.flourish.right{background:linear-gradient(90deg,var(--gold),transparent)}
.headline-row h1{
  font-size:20px;font-weight:bold;color:var(--gold);text-align:center;letter-spacing:1px;
  background:linear-gradient(90deg,var(--gold-dark),var(--gold),#fff8d0,var(--gold),var(--gold-dark));
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{
  0%{background-position:0% 0}
  100%{background-position:200% 0}
}

/* -- FORTUNE RIBBON -- */
.fortune-ribbon{
  text-align:center;
}
.fortune-ribbon span{
  display:inline-block;
  background:var(--gold);color:var(--red);
  font-size:11px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;
  padding:6px 18px;
  clip-path:polygon(6% 0,94% 0,100% 50%,94% 100%,6% 100%,0% 50%);
  animation:ribbonShimmer 2.6s ease-in-out infinite;
}
@keyframes ribbonShimmer{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.3)}
}

/* -- MEDALLION ART FRAME -- */
.medallion{
  position:relative;
  border-radius:16px;
  border:4px solid var(--gold);
  overflow:hidden;
  animation:medallionGlow 3s ease-in-out infinite alternate;
}
@keyframes medallionGlow{
  from{box-shadow:0 0 10px rgba(255,215,0,0.3)}
  to{box-shadow:0 0 26px rgba(255,215,0,0.7)}
}

/* -- MAIN CTA - lacquered button -- */
.lacquer-cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;color:var(--gold);
  background:linear-gradient(160deg,#a51515,#7a0c0c);
  border:2px solid var(--gold);
  border-radius:99px;
  padding:14px 18px;
  font-size:15px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;
  transition:transform .12s;
}
.lacquer-cta:active{transform:scale(0.97)}
.lacquer-cta .spin-coin{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--gold);
  background:radial-gradient(circle,var(--gold-dark),var(--gold));
  animation:coinSpin 4s linear infinite;
  flex-shrink:0;
}

/* -- DIVIDER -- */
.hr{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.6}

/* -- ACTION PLAQUES -- */
.plaque-list{display:flex;flex-direction:column;gap:8px}
.plaque{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  border:1.5px solid var(--gold);
  border-radius:10px;
  padding:10px 12px;
  background:rgba(255,215,0,0.06);
}
.plaque-left{display:flex;align-items:center;gap:10px;min-width:0}
.plaque-icon{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  border:2px solid var(--gold);background:var(--red2);color:var(--gold);
}
.plaque-text{min-width:0}
.plaque-name{font-size:13px;font-weight:bold;color:var(--cream)}
.plaque-sub{font-size:9px;color:var(--gold-dark);text-transform:uppercase;letter-spacing:1px}
.plaque-btn{
  flex-shrink:0;
  display:inline-block;padding:8px 16px;border-radius:99px;
  font-size:10px;font-weight:bold;letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;color:var(--red);
  background:linear-gradient(160deg,#fff8d0,var(--gold));
  transition:transform .1s;
}
.plaque-btn:active{transform:scale(0.95)}

/* -- FOOTER -- */
.footer{
  text-align:center;font-size:9px;color:var(--gold-dark);letter-spacing:2px;text-transform:uppercase;
}
.footer a{color:var(--gold);text-decoration:none;font-weight:bold}
</style>
</head>
