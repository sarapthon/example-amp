/* -----------------------------------------------
   TEMPLATE 14 - FUT ULTIMATE TEAM PLAYER CARD
   Silver/gold foil sports trading card with
   diagonal shine sweep and stat-bar rows.
----------------------------------------------- */
:root{
  --gold:#f0c040;
  --gold-dark:#a9791a;
  --silver:#d9d9de;
  --dark:#15151a;
  --dark2:#1f1f26;
  --ink:#fff;
  --muted:#9a9aa4;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(240,192,64,0.10) 0%, transparent 60%),
    var(--dark);
  color:var(--ink);
  overflow-x:hidden;
  min-height:100vh;
}

.wrap{
  max-width:420px;margin:0 auto;padding:24px 14px 40px;
  position:relative;z-index:2;
}

/* -- CARD SHAPE - shield-top silhouette via clip-path -- */
.card{
  position:relative;
  background:linear-gradient(165deg,#2a2a33 0%,var(--dark2) 60%,#0c0c10 100%);
  border:2px solid var(--gold-dark);
  clip-path:polygon(8% 0%, 92% 0%, 100% 6%, 100% 100%, 0% 100%, 0% 6%);
  padding:22px 16px 18px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* foil diagonal sweep */
.foil-sweep{
  position:absolute;inset:-60%;z-index:1;pointer-events:none;
  background:linear-gradient(115deg,
    transparent 30%,
    rgba(255,255,255,0.18) 45%,
    rgba(240,192,64,0.35) 50%,
    rgba(255,255,255,0.18) 55%,
    transparent 70%);
  animation:foilSweep 4s ease-in-out infinite;
}
@keyframes foilSweep{
  0%{transform:translate(-20%,-10%) rotate(0deg)}
  50%{transform:translate(15%,10%) rotate(2deg)}
  100%{transform:translate(-20%,-10%) rotate(0deg)}
}

.content{position:relative;z-index:2;display:flex;flex-direction:column;gap:14px}

/* -- TOP ROW: rating badge + logo -- */
.top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.rating-badge{
  display:flex;flex-direction:column;align-items:center;
  font-weight:900;
}
.rating-num{
  font-size:34px;line-height:1;
  background:linear-gradient(160deg,#fff,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 8px rgba(240,192,64,0.4);
  letter-spacing:-1px;
}
.rating-tag{
  font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:900;margin-top:2px;
}
.logo-row{padding-top:4px}

/* -- PLAYER PHOTO / BANNER -- */
.photo-frame{
  position:relative;
  border-radius:8px;
  overflow:hidden;
  background:radial-gradient(circle at 50% 35%, rgba(240,192,64,0.25), transparent 65%), #000;
  border:1px solid rgba(240,192,64,0.35);
}

/* -- NAME PLATE / RIBBON -- */
.name-ribbon{
  background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-dark));
  color:#1a1404;
  text-align:center;
  padding:10px 8px;
  border-radius:6px;
  font-size:19px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 4px 12px rgba(240,192,64,0.25);
}

/* -- MAIN CTA - match-ready stat bar -- */
.match-cta{
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  text-decoration:none;color:var(--dark);
  background:linear-gradient(90deg,var(--silver),#fff,var(--silver));
  border-radius:8px;
  padding:14px 16px;
  font-weight:900;letter-spacing:2px;text-transform:uppercase;
  transition:transform .12s;
}
.match-cta:active{transform:scale(0.98)}
.match-cta::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(115deg,transparent 40%,rgba(240,192,64,0.5) 50%,transparent 60%);
  animation:shineMove 2.4s ease-in-out infinite;
}
@keyframes shineMove{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}
.match-cta .cta-main{font-size:14px;position:relative;z-index:2}
.match-cta .cta-sub{font-size:9px;letter-spacing:1px;font-weight:bold;color:#444;position:relative;z-index:2;margin-top:2px}
.match-cta .cta-arrow{font-size:20px;position:relative;z-index:2;color:var(--gold-dark)}

/* -- DIVIDER -- */
.hr{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dark),transparent);
  opacity:.5;
}

/* -- STAT BAR ROWS (Login/Daftar/Livechat) -- */
.stat-list{display:flex;flex-direction:column;gap:10px}
.stat-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;
  padding:10px 12px;
}
.stat-left{display:flex;align-items:center;gap:10px;min-width:0}
.stat-abbr{
  flex-shrink:0;
  width:34px;height:34px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;letter-spacing:1px;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark));
  color:var(--dark);
}
.stat-text{min-width:0}
.stat-name{font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.stat-sub{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.stat-btn{
  flex-shrink:0;
  display:inline-block;padding:8px 16px;border-radius:6px;
  font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;color:var(--dark);
  background:var(--silver);
  border:1px solid rgba(255,255,255,0.5);
  transition:transform .1s;
}
.stat-btn:active{transform:scale(0.95)}

/* -- FOOTER -- */
.footer{
  text-align:center;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
}
.footer a{color:var(--gold);text-decoration:none;font-weight:900}
</style>
